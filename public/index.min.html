<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Miner Locator</title>
    <style>
        /* --- CSS Variables & Resets --- */
        :root {
            --bg-color: #f0f2f5; 
            --container-bg: #ffffff;
            --text-color: #000000; 
            --border-color: #c0c9d8; 
            --table-border: #e2e8f0;
            --th-bg: #f1f5f9; 
            --th-hover: #e2e8f0;
            --input-bg: #ffffff;
            --success-color: #ea580c; 
            --error-color: #cc0000; 
            --status-color: #333333; 
            --primary-color: #1d4ed8; 
            --primary-hover: #1e3a8a;
            --primary-text: #ffffff;
            --gradient-accent: #00bfff; 
            --container-shadow: 0 20px 40px rgba(0, 0, 0, 0.12); 
            --corner-radius: 16px; 
            --modal-bg: rgba(0,0,0,0.5);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d0d0d;
                --container-bg: #1a1d21;
                --text-color: #ffffff; 
                --border-color: #4a5568; 
                --table-border: #2d3748;
                --th-bg: #2d3748; 
                --th-hover: #4a5568;
                --input-bg: #111111;
                --success-color: #fb923c; 
                --error-color: #f87171; 
                --status-color: #e2e8f0; 
                --primary-color: #3b82f6;
                --primary-hover: #2563eb;
                --gradient-accent: #34d399; 
                --container-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            }
        }

        * { box-sizing: border-box; } 
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 0; background: var(--bg-color); color: var(--text-color); margin: 0; line-height: 1.5; }

        /* App shell and sidebar rail layout */
        .app-shell { display: grid; grid-template-columns: 46px minmax(0, 1fr); gap: 0; width: 100%; min-height: 100vh; }
        .sidebar {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: visible;
        }
        .sidebar-header {
            display: none;
        }
        .sidebar-title {
            display: none;
        }
        /* Sidebar menu tiles */
        .sidebar nav { display: flex; flex-direction: column; }
        .menu-item {
            width: 46px;
            text-align: left;
            border: 0;
            border-left: 3px solid transparent;
            border-radius: 0;
            background: var(--container-bg);
            color: var(--status-color);
            padding: 10px 10px;
            margin: 0;
            font-size: 12px;
            line-height: 1.2;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            min-height: 48px;
            border-bottom: 1px solid var(--table-border);
            overflow: hidden;
            transition: width 0.2s ease, background 0.2s ease, color 0.2s ease;
            white-space: nowrap;
            position: relative;
            z-index: 2;
        }
        .menu-item:hover {
            width: 168px;
            background: var(--th-bg);
            color: var(--text-color);
            z-index: 3;
        }
        button.menu-item:hover:not(:disabled) { background: var(--th-bg); color: var(--text-color); }
        .menu-item.active {
            background: var(--th-bg);
            border-left-color: #f2b705;
            color: var(--text-color);
        }
        .menu-item .menu-icon {
            color: var(--status-color);
            line-height: 1;
        }
        .menu-item .menu-icon svg {
            width: 22px;
            height: 22px;
            display: block;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .menu-item.active .menu-icon { color: var(--text-color); }
        .menu-item .menu-label {
            display: inline-block;
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.15s ease, transform 0.15s ease;
            pointer-events: none;
        }
        .menu-item:hover .menu-label {
            opacity: 1;
            transform: translateX(0);
        }
        /* Footer area inside sidebar */
        .sidebar-bottom {
            margin-top: auto;
            border-top: 1px solid var(--table-border);
        }
        .sidebar-bottom .menu-item {
            border-bottom: 1px solid var(--table-border);
        }
        .sidebar-version {
            padding: 10px 6px 12px;
            text-align: center;
            font-size: 9px;
            color: #b6bfcb;
            line-height: 1.3;
            display: none;
        }
        /* Main panel */
        .main-content { min-width: 0; padding: 10px; }
        /* View switching containers */
        .view-panel { display: none; }
        .view-panel.active { display: block; }
        .placeholder-card { background: var(--container-bg); padding: 24px; border-radius: 8px; box-shadow: var(--container-shadow); border: 1px solid var(--border-color); }
        .placeholder-card h3 { margin-top: 0; margin-bottom: 10px; }

        .site-map-shell {
            display: block;
        }
        .site-map-main {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 0;
            box-shadow: none;
            padding: 10px;
        }
        .site-map-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        .site-map-toolbar h3 {
            margin: 0;
            margin-right: auto;
            font-size: 20px;
            letter-spacing: 0.01em;
        }
        .site-map-canvas {
            height: 520px;
            border: 1px solid var(--table-border);
            border-radius: 0;
            background:
                linear-gradient(90deg, color-mix(in srgb, var(--table-border) 55%, transparent) 1px, transparent 1px) 0 0/28px 28px,
                linear-gradient(0deg, color-mix(in srgb, var(--table-border) 55%, transparent) 1px, transparent 1px) 0 0/28px 28px,
                linear-gradient(135deg, color-mix(in srgb, var(--th-bg) 65%, transparent), transparent);
            position: relative;
            overflow: hidden;
        }
        .site-map-empty {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--status-color);
            font-size: 14px;
            pointer-events: none;
        }
        .site-node {
            position: absolute;
            min-width: 160px;
            border: 1px solid var(--border-color);
            border-radius: 0;
            background: var(--container-bg);
            box-shadow: none;
            padding: 6px;
            cursor: default;
            user-select: none;
        }
        .site-node.site-node-editable { cursor: grab; }
        .site-node.site-node-editable:active { cursor: grabbing; }
        .site-node-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }
        .site-node-title {
            font-weight: 600;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .site-node-delete {
            width: 20px;
            height: 20px;
            border: none;
            border-radius: 0;
            padding: 0;
            font-size: 12px;
            line-height: 1;
            background: transparent;
            color: var(--status-color);
        }
        .site-node-delete:hover {
            background: var(--th-bg);
            color: var(--text-color);
        }
        .site-node-building { border-left: 4px solid #f59e0b; }
        .site-node-rack { border-left: 4px solid #22c55e; }
        .site-node-miner { border-left: 4px solid #3b82f6; }
        .site-node-offline { border-left-color: #ef4444; }
        .site-node-selected {
            outline: 2px solid var(--primary-color);
            outline-offset: 1px;
        }
        .site-node-resize-handle {
            position: absolute;
            right: 4px;
            bottom: 4px;
            width: 12px;
            height: 12px;
            border-radius: 0;
            background: color-mix(in srgb, var(--primary-color) 65%, transparent);
            border: 1px solid color-mix(in srgb, var(--primary-hover) 70%, transparent);
            cursor: nwse-resize;
        }
        .site-node-resize-handle:hover {
            background: var(--primary-color);
        }
        .site-node-toggle {
            width: 20px;
            height: 20px;
            border: none;
            background: transparent;
            color: var(--status-color);
            font-size: 11px;
            line-height: 1;
            padding: 0;
            border-radius: 0;
            cursor: pointer;
        }
        .site-node-toggle:hover {
            background: var(--th-bg);
            color: var(--text-color);
        }
        .site-map-context {
            margin-left: auto;
            min-height: 30px;
            min-width: 140px;
            width: auto;
            font-size: 11px;
            color: var(--status-color);
            border: 1px solid var(--table-border);
            border-radius: 0;
            padding: 6px 8px;
            background: var(--th-bg);
        }

        .ip-ranges-panel {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: var(--container-shadow);
            padding: 20px;
        }
        .ip-ranges-panel h3 {
            margin: 0 0 6px;
        }
        .ip-ranges-muted {
            margin: 0 0 16px;
            color: var(--status-color);
            font-size: 13px;
        }
        .range-config-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(0, 2.2fr) auto;
            gap: 12px;
            align-items: start;
        }
        .range-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .range-field input,
        .range-field select {
            width: 100%;
            background: var(--input-bg);
            color: var(--text-color);
        }
        .range-mode-group {
            margin-bottom: 12px;
        }
        .range-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        .range-actions-inline {
            display: inline-flex;
            gap: 10px;
            align-items: center;
            padding-top: 28px;
        }
        .range-preview {
            margin-top: 12px;
            padding: 10px 12px;
            border: 1px solid var(--table-border);
            border-radius: 8px;
            background: var(--th-bg);
            font-size: 13px;
            color: var(--status-color);
            word-break: break-word;
        }
        .saved-range-list {
            margin-top: 16px;
            border: 1px solid var(--table-border);
            border-radius: 8px;
            overflow: hidden;
        }
        .saved-range-row {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(0, 2.2fr) auto;
            gap: 10px;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--table-border);
            background: var(--container-bg);
        }
        .saved-range-row:last-child {
            border-bottom: none;
        }
        .saved-range-header {
            background: var(--th-bg);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--status-color);
        }
        .saved-range-title {
            font-weight: 700;
        }
        .saved-range-expression {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 14px;
            color: var(--status-color);
            overflow-wrap: anywhere;
        }
        .saved-range-actions {
            display: inline-flex;
            gap: 8px;
            align-items: center;
        }
        .saved-action-icon {
            width: 30px;
            height: 30px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            color: var(--status-color);
        }
        .saved-action-icon:hover {
            background: var(--th-bg);
            color: var(--text-color);
        }
        .saved-action-icon svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: block;
        }
        .range-inline-meta {
            font-size: 12px;
            color: var(--status-color);
            margin-top: 4px;
        }

        .container { max-width: none; margin: 0; background: var(--container-bg); padding: 30px; border-radius: 8px; box-shadow: var(--container-shadow); border: 1px solid var(--border-color); }
        .app-title { margin-top: 0; margin-bottom: 25px; font-size: 38px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(90deg, #ea580c, #f59e0b); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; }

        /* --- Controls --- */
        .controls { display: flex; gap: 15px; margin-bottom: 0; align-items: center; flex-wrap: wrap; background: var(--th-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); justify-content: space-between; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.08); }
        .control-group { display: flex; align-items: center; gap: 10px; }
        label { font-weight: 700; font-size: 14px; color: var(--status-color); }
        input, button { padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        input[type="text"] { width: 250px; background: var(--input-bg); color: var(--text-color); font-weight: 500; }
        
        button { background: var(--primary-color); color: var(--primary-text); cursor: pointer; border: none; font-weight: 700; }
        button:hover:not(:disabled) { background: var(--primary-hover); }
        button.secondary { background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); }
        button.secondary:hover { background: var(--primary-color); color: var(--primary-text); }
        button:disabled { background: var(--border-color); cursor: not-allowed; color: var(--status-color); opacity: 0.6; }
        
        .icon-btn { font-size: 18px; padding: 10px 14px; display: flex; align-items: center; justify-content: center; }
        #status { font-weight: 700; font-size: 14px; color: var(--status-color); margin-left: 10px; }

        /* --- Table Styling --- */
        .table-wrapper { overflow-x: auto; }
        .table-tools { display: flex; justify-content: flex-start; margin: 0; padding: 10px 0; }
        .column-toolbox {
            padding: 0;
            border-radius: 8px;
            display: inline-flex;
            align-items: stretch;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--table-border);
            background: var(--container-bg);
            color: var(--status-color);
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
        }
        .column-tool-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            min-height: 32px;
            border: none;
            border-left: 1px solid var(--table-border);
            background: transparent;
            color: inherit;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            text-align: center;
        }
        .column-tool-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 8px 0 0 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--status-color);
        }
        .column-tool-label:hover,
        .column-tool-icon:hover {
            background: var(--th-bg);
            color: var(--text-color);
        }
        .column-tool-icon.active {
            background: var(--th-bg);
            color: var(--text-color);
        }
        .column-tool-icon svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: block;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 0; font-size: 14px; }
        th:first-child { border-top-left-radius: 8px; border-left: 1px solid var(--table-border); }
        th:last-child { border-top-right-radius: 8px; border-right: 1px solid var(--table-border); }
        th, td { text-align: left; border-bottom: 1px solid var(--table-border); white-space: nowrap; }
        th { padding: 3px 16px; }
        td { padding: 12px 16px; }
        
        th { 
            background-color: var(--th-bg); font-weight: 700; cursor: pointer; user-select: none; 
            text-transform: uppercase; font-size: 12px; letter-spacing: 0.05em; 
            color: var(--status-color); border-top: 1px solid var(--table-border); 
            transition: background 0.2s;
        }
        th.header-draggable { cursor: grab; }
        th.header-draggable:active { cursor: grabbing; }
        th:hover { background-color: var(--th-hover); color: var(--text-color); }

        .header-content {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .header-label {
            display: inline-block;
        }
        .sort-controls {
            display: inline-flex;
            flex-direction: column;
            align-items: stretch;
            border: 1px solid var(--container-bg);
            border-radius: 6px;
            overflow: hidden;
            background: color-mix(in srgb, var(--container-bg) 78%, transparent);
        }
        .sort-arrow-btn {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--status-color);
            padding: 0;
            margin: 0;
            border-radius: 0;
            cursor: pointer;
            font-size: 9px;
            line-height: 1;
            font-weight: 700;
        }
        .sort-arrow-btn + .sort-arrow-btn {
            border-left: none;
            border-top: 1px solid var(--container-bg);
        }
        .sort-arrow-btn:hover {
            background: var(--container-bg);
            color: var(--text-color);
        }
        .sort-arrow-btn.active {
            background: var(--container-bg);
            color: var(--success-color);
        }
        
        /* New Table Header Drag Styles */
        th.header-dragging { opacity: 0.4; }
        th.header-drag-over { border-left: 4px solid var(--primary-color) !important; background-color: var(--th-hover); }

        tbody tr:hover { background-color: rgba(0, 0, 0, 0.03); }
        @media (prefers-color-scheme: dark) { tbody tr:hover { background-color: rgba(255, 255, 255, 0.03); } }
        .online { color: var(--success-color); font-weight: 700; }
        .sort-icon { font-size: 10px; margin-left: 6px; color: var(--primary-color); }

        /* --- Modal Styling --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 1000; align-items: center; justify-content: center; }
        .modal { background: var(--container-bg); padding: 25px; border-radius: 12px; width: 400px; max-width: 90%; box-shadow: var(--container-shadow); border: 1px solid var(--border-color); }
        .modal h3 { margin-top: 0; }
        
        .col-item { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid var(--table-border); background: var(--container-bg); cursor: grab; transition: padding 0.2s ease, height 0.2s ease, opacity 0.2s ease; overflow: hidden; user-select: none; }
        .col-item:active { cursor: grabbing; }
        .col-item.collapsed-slot { padding-top: 0; padding-bottom: 0; height: 0; opacity: 0; border-bottom: none; }
        .col-item.drag-over { padding-top: 48px; }
        
        .drag-handle { color: var(--status-color); margin-right: 12px; font-size: 16px; user-select: none; }
        .col-item input[type="checkbox"] { margin-right: 10px; cursor: pointer; transform: scale(1.2); }
        .col-item span.label-text { font-weight: 500; user-select: none; pointer-events: none; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        /* Tablet/mobile layout adaptations */
        @media (max-width: 980px) {
            .app-shell { grid-template-columns: 1fr; gap: 14px; }
            .sidebar { position: static; }
            .sidebar { min-height: 0; height: auto; }
            .sidebar nav { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .menu-item {
                width: 100%;
                min-height: 64px;
            }
            .menu-item .menu-label {
                opacity: 1;
                transform: none;
            }
            .sidebar-title { font-size: 14px; letter-spacing: 0.02em; text-transform: none; text-align: left; }
            .main-content { padding: 0 6px 6px; }
        }

        @media (max-width: 640px) {
            .container { padding: 18px; }
            .sidebar nav { grid-template-columns: 1fr; }
            input[type="text"] { width: 100%; }
            .range-config-grid { grid-template-columns: 1fr; }
            .saved-range-row { grid-template-columns: 1fr; }
            .saved-range-actions { justify-content: flex-start; }
            .site-map-shell { grid-template-columns: 1fr; }
            .site-map-canvas { height: 440px; }
        }
    </style>
</head>
<body>

<!-- App shell: sidebar navigation + active content view -->
<div class="app-shell">
    <!-- Left navigation rail -->
    <aside class="sidebar">
        <!-- Primary navigation -->
        <nav>
            <button class="menu-item active" onclick="selectView('dashboardView', this)">
                <span class="menu-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 10.5L12 3l9 7.5"></path>
                        <path d="M5 9.5V21h14V9.5"></path>
                    </svg>
                </span>
                <span class="menu-label">Home</span>
            </button>
            <button class="menu-item" onclick="selectView('savedRangesView', this)">
                <span class="menu-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M22 19H14M2 19H10"></path>
                        <path d="M12 17V14"></path>
                        <circle cx="12" cy="19" r="2"></circle>
                        <path d="M2 11C2 9.34315 3.34315 8 5 8H19C20.6569 8 22 9.34315 22 11C22 12.6569 20.6569 14 19 14H5C3.34315 14 2 12.6569 2 11Z"></path>
                        <path d="M2 5C2 3.34315 3.34315 2 5 2H19C20.6569 2 22 3.34315 22 5C22 6.65685 20.6569 8 19 8H5C3.34315 8 2 6.65685 2 5Z"></path>
                        <path d="M13 5L19 5"></path>
                        <path d="M13 11L19 11"></path>
                        <circle cx="6" cy="5" r="1" fill="currentColor"></circle>
                        <circle cx="6" cy="11" r="1" fill="currentColor"></circle>
                    </svg>
                </span>
                <span class="menu-label">IP Ranges</span>
            </button>
            <button class="menu-item" disabled title="Site Map disabled">
                <span class="menu-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <circle cx="6" cy="6" r="2" fill="currentColor"></circle>
